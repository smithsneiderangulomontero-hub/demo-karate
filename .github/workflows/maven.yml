name: Karate CI

on:
  push:
    branches: [ "main", "feature/001-usuarios-nuevos" ]
  pull_request:
    branches: [ "main" ]
    # --- NUEVO: Programación ---
    schedule:
      - cron: '12 22 * * *' # Ejecuta todos los días a las 22:12 UTC (23:12 en Barcelona)
    # --------------------------

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Ejecuta los tests. Usamos '|| true' para que no falle el paso si los tests fallan
      - name: Build and Test with Maven
        run: mvn clean test || true

      # Sube reportes si existen
      - name: Upload Karate Reports
        uses: actions/upload-artifact@v4
        if: always() # Se ejecuta aunque los tests fallen
        with:
          name: karate-reports
          path: target/karate-reports/ # <--- Asegúrate de esta barra final '/'
          if-no-files-found: warn # <--- Cambiado a 'warn' para ver si encuentra algo